services:
  - type: web
    name: iot-sentinel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "10000"
      - key: RELOAD
        value: "false"
